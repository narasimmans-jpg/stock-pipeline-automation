name: Daily Stock & Pipeline Report

on:
  schedule:
    # Runs at 05:00 UTC = 10:30 IST (UTC+5:30)
    - cron: '0 5 * * *'

  # Also allows you to trigger it manually from GitHub website
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your repo code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the report script
      #    All secrets are injected as environment variables
      - name: Run stock pipeline report
        env:
          EMAIL_USER:            ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:        ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL:       ${{ secrets.RECIPIENT_EMAIL }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY:       ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET:    ${{ secrets.DROPBOX_APP_SECRET }}
        run: python stock_pipeline.py
